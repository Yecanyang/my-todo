<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程綜合管理看板</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #3498db;
            --todo-color: #2ecc71;
            --worker-color: #9b59b6;
            --danger-color: #e74c3c;
            --border-radius: 12px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; padding-bottom: 50px; }
        
        header { text-align: center; margin-bottom: 15px; }
        header h1 { font-size: 1.5rem; color: #2c3e50; margin-top: 10px; }
        
        .header-controls { display: flex; justify-content: space-between; align-items: center; }
        .settings-btn { background: #7f8c8d; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        #sync-status { font-size: 0.8rem; color: #7f8c8d; }

        /* 看板排版 */
        .columns-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { 
            .columns-container { grid-template-columns: repeat(2, 1fr); }
        }
        
        .column { background: var(--card-bg); border-radius: var(--border-radius); padding: 15px; display: flex; flex-direction: column; }
        .column.todo { border-top: 6px solid var(--todo-color); }
        .column.worker { border-top: 6px solid var(--worker-color); }
        
        .column-title { font-size: 1.1rem; margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; font-weight: bold; }
        .column.todo .column-title { color: var(--todo-color); }
        .column.worker .column-title { color: var(--worker-color); }
        
        /* 輸入控制區 */
        .input-group { display: flex; gap: 6px; margin-bottom: 15px; }
        .todo-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
        
        /* 按鈕樣式 */
        .add-btn { color: white; border: none; padding: 8px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .todo-btn { background: var(--todo-color); }
        .worker-btn { background: var(--worker-color); }
        
        /* 列表樣式 */
        .todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .todo-item { display: flex; align-items: center; background: #fdfdfd; padding: 10px 12px; border-radius: 8px; border: 1px solid #eaeaea; }
        .todo-checkbox { width: 18px; height: 18px; margin-right: 10px; cursor: pointer; }
        .todo-text { font-size: 0.95rem; flex: 1; word-break: break-all; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: #b0b0b0; }
        .delete-btn { background: transparent; color: var(--danger-color); border: none; font-size: 1.1rem; margin-left: 10px; cursor: pointer; }
        
        /* 彈窗與遮罩 */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: var(--border-radius); width: 90%; max-width: 500px; }
        .modal-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin: 15px 0; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-save { background: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 8px; }
        .btn-cancel { background: #eee; border: none; padding: 8px 16px; border-radius: 8px; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: flex; justify-content: center; align-items: center; font-weight: bold; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loading-overlay" style="display: none;">☁️ 正在與雲端同步資料...</div>

    <header>
        <div class="header-controls">
            <button class="settings-btn" onclick="openSettings()">⚙️ 設定雲端網址</button>
            <div id="sync-status">未設定雲端網址</div>
        </div>
        <h1>📋 工程綜合管理看板</h1>
    </header>

    <div class="columns-container">
        <div class="column todo" id="col-todo">
            <div class="column-title">🟢 今日工作事項</div>
            <div class="input-group">
                <input type="text" class="todo-input" id="todo-input" placeholder="新增工作...">
                <button class="add-btn todo-btn" onclick="addItem('col-todo')">新增</button>
            </div>
            <ul class="todo-list"></ul>
        </div>

        <div class="column worker" id="col-worker">
            <div class="column-title">🟣 點工/廠商進場</div>
            <div class="input-group">
                <input type="text" class="todo-input" id="worker-input" placeholder="新增廠商/點工進場...">
                <button class="add-btn worker-btn" onclick="addItem('col-worker')">新增</button>
            </div>
            <ul class="todo-list"></ul>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3>⚙️ 雲端網址設置</h3>
            <p style="font-size: 0.8rem; color: #666; margin-top: 5px;">請貼上原本主網站專屬的 Apps Script 網址</p>
            <input type="text" id="api-url-input" class="modal-input" placeholder="https://script.google.com/macros/s/.../exec">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeSettings()">取消</button>
                <button class="btn-save" onclick="saveSettings()">儲存並載入</button>
            </div>
        </div>
    </div>

    <script>
        let SCRIPT_URL = localStorage.getItem('script_url') || '';
        let boardData = { "col-todo": [], "col-worker": [] };

        document.addEventListener('DOMContentLoaded', () => {
            if (SCRIPT_URL) {
                loadCloudData();
            } else {
                updateSyncStatus('⚠️ 請先設定雲端網址');
                openSettings();
            }
        });

        // 修正：將讀取目標修改回您原本的試算表工作表名稱 "todos"
        function loadCloudData() {
            if (!SCRIPT_URL) return;
            showLoading(true);
            updateSyncStatus('正在讀取雲端資料...');
            fetch(`${SCRIPT_URL}?sheet=todos`)
                .then(res => res.json())
                .then(data => {
                    boardData = data && data["col-todo"] ? data : { "col-todo": [], "col-worker": [] };
                    renderBoard();
                    updateSyncStatus('☁️ 雲端讀取成功');
                })
                .catch(err => { updateSyncStatus('❌ 讀取失敗，請檢查設定'); })
                .finally(() => showLoading(false));
        }

        // 修正：將存檔目標修改回您原本的試算表工作表名稱 "todos"
        function saveCloudData() {
            if (!SCRIPT_URL) return;
            updateSyncStatus('☁️ 正在存檔至雲端...');
            fetch(`${SCRIPT_URL}?sheet=todos`, {
                method: 'POST',
                body: JSON.stringify(boardData)
            })
            .then(res => res.json())
            .then(data => { if(data.status === 'success') updateSyncStatus('☁️ 雲端存檔成功'); })
            .catch(err => { updateSyncStatus('❌ 雲端存檔失敗'); });
        }

        function renderBoard() {
            ['col-todo', 'col-worker'].forEach(colId => {
                const colEl = document.getElementById(colId);
                const ul = colEl.querySelector('.todo-list');
                ul.innerHTML = '';
                const items = boardData[colId] || [];

                items.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = 'todo-item' + (item.completed ? ' completed' : '');
                    li.innerHTML = `
                        <input type="checkbox" class="todo-checkbox" ${item.completed ? 'checked' : ''} onchange="toggleItem('${colId}', ${index})">
                        <span class="todo-text" onclick="toggleItem('${colId}', ${index})">${item.text}</span>
                        <button class="delete-btn" onclick="deleteItem('${colId}', ${index})">🗑️</button>
                    `;
                    ul.appendChild(li);
                });
            });
        }

        function addItem(colId) {
            const prefix = colId === 'col-todo' ? 'todo' : 'worker';
            const input = document.getElementById(`${prefix}-input`);
            const text = input.value.trim();
            if (!text) return;

            if (!boardData[colId]) boardData[colId] = [];
            boardData[colId].push({ text: text, completed: false });

            renderBoard();
            saveCloudData();
            input.value = '';
        }

        function deleteItem(colId, index) {
            boardData[colId].splice(index, 1);
            renderBoard();
            saveCloudData();
        }

        function toggleItem(colId, index) {
            boardData[colId][index].completed = !boardData[colId][index].completed;
            renderBoard();
            saveCloudData();
        }

        function openSettings() { document.getElementById('api-url-input').value = SCRIPT_URL; document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        function saveSettings() {
            const val = document.getElementById('api-url-input').value.trim();
            if(!val) return;
            localStorage.setItem('script_url', val);
            SCRIPT_URL = val;
            closeSettings();
            loadCloudData();
        }
        function showLoading(show) { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; }
        function updateSyncStatus(msg) { document.getElementById('sync-status').innerText = msg; }
    </script>
</body>
</html>
